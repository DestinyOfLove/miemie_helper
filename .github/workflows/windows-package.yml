name: Build Windows Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        run: python -m pip install uv

      - name: Sync Python environment
        run: uv sync

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend export
        working-directory: frontend
        run: npm run build

      - name: Install PyInstaller
        run: uv run python -m pip install pyinstaller==6.16.0

      - name: Build Windows bundle
        run: uv run python -m PyInstaller --noconfirm packaging/windows.spec

      - name: Create zip artifact
        shell: pwsh
        run: Compress-Archive -Path dist/MieMieHelper/* -DestinationPath dist/MieMieHelper-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MieMieHelper-windows
          path: dist/MieMieHelper-windows.zip
